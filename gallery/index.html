---
layout: default
title: Glove Relace Photos
description: Glove restoration before and after photos.
nav: gallery
body_class: inner
---

<main class="container page page-under-header">
    <h1>Before &amp; After</h1>
    <p class="lede">A small selection of gloves that showed up hopeless and left with a second chance.</p>

    <div class="gallery-grid">
      {% for item in site.data.gallery %}
        <img
          src="{{ '/assets/img/beforeafter/' | append: item.file | relative_url }}"
          alt="{{ item.alt | escape }}"
          loading="lazy"
          decoding="async">
      {% endfor %}
    </div>

    <div class="lightbox" aria-hidden="true">
      <button class="lb-close" aria-label="Close">×</button>

      <button class="lb-prev" aria-label="Previous image">‹</button>

      <div class="lb-viewport">
        <div class="lb-track"></div>
      </div>

      <button class="lb-next" aria-label="Next image">›</button>

      <div class="lb-hint" aria-hidden="true">
        
        <span class="lb-counter"></span>
      </div>
    </div>
  </main>
