<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{% if page.title %}{{ page.title }} | {% endif %}Murph’s Mitt Maintenance</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Baseball & softball glove repair. Local drop-off and nationwide mail-in service.{% endif %}" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/styles.css?v=17' | relative_url }}" />
</head>

<body class="{{ page.body_class | default: 'inner' }}">
  {% include header.html %}

  {{ content }}

  {% include footer.html %}

  <script data-cfasync="false" src="{{ '/assets/js/main.js?v=17' | relative_url }}"></script>
</body>
</html>
